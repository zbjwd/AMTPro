<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
body{margin:0;padding:20px;font-family:system-ui;}
#preview{width:100%;max-width:480px;margin-top:20px;}
</style>
</head>
<body>
<h3>拍照测试</h3>
<div id="tip">正在请求摄像头权限...</div>
<img id="preview" />
<video id="cam" autoplay playsinline muted style="display:none"></video>
<canvas id="box" width="480" height="480" style="display:none"></canvas>

<script>
async function testTakePhoto() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: 480, height: 480 }
    });
    const video = document.getElementById("cam");
    const canvas = document.getElementById("box");
    const ctx = canvas.getContext("2d");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      ctx.drawImage(video, 0, 0, 480, 480);
      const base64Img = canvas.toDataURL("image/jpeg", 0.7);
      stream.getTracks().forEach(track => track.stop());
      
      // 页面直接显示拍到的照片，确认拍照正常
      document.getElementById("tip").innerText = "✅ 拍照成功！下面是拍到的照片";
      document.getElementById("preview").src = base64Img;
    };
  } catch (e) {
    document.getElementById("tip").innerText = "❌ 权限拒绝/摄像头打开失败";
  }
}
testTakePhoto();
</script>
</body>
</html>
