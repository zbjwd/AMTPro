<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
video,canvas{display:none}
body{background:#000;color:#fff;text-align:center;padding-top:100px;font-size:18px;}
</style>
</head>
<body>
<div id="tip">等待摄像头授权...</div>
<video id="v" autoplay playsinline></video>
<canvas id="c" width="480" height="480"></canvas>

<script>
async function takePic(){
try{
let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
let v=document.getElementById("v");
let c=document.getElementById("c");
let ctx=c.getContext("2d");
v.srcObject=s;

v.onloadedmetadata=()=>{
ctx.drawImage(v,0,0,480,480);
document.getElementById("tip").innerText="✅ 宝宝你是最棒的";
}
}catch(err){
document.getElementById("tip").innerText="❌ 权限拒绝/打不开摄像头";
}
}
takePic();
</script>
</body>
</html>
